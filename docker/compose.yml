version: '3'

services:

  backend:
    build:
      context: ../backend
      dockerfile: dockerfile
    container_name: backend-python
    ports:
      - "8000:5000"

  webserver:
    image: nginx:latest
    container_name: nginx-proxy
    ports:
      - "8008:80"
    volumes:
      - ../nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ../website:/usr/share/nginx/html
